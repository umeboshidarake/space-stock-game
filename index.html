<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SPACE STOCK</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#140a2a,#000);
color:white;
overflow-x:hidden;
}

h1{
text-align:center;
font-size:40px;
color:#e9d5ff;
text-shadow:0 0 25px #a855f7,0 0 50px #7e22ce;
}

#game{
padding:20px;
}

#stocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid #a855f7;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 0 20px rgba(168,85,247,0.5);
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 35px #a855f7;
}

button{
background:black;
border:1px solid #a855f7;
color:#c084fc;
padding:6px 12px;
margin:3px;
cursor:pointer;
transition:0.3s;
}

button:hover:not(:disabled){
background:#a855f7;
color:black;
box-shadow:0 0 15px #a855f7;
}

button:disabled{
border-color:#555;
color:#555;
cursor:not-allowed;
box-shadow:none;
}

.unlockBtn{
animation:unlockGlow 1.5s infinite alternate;
}

@keyframes unlockGlow{
from{box-shadow:0 0 5px #a855f7;}
to{box-shadow:0 0 25px #a855f7;}
}

.locked{
opacity:0.3;
}

canvas{
background:black;
border:none;
margin-top:10px;
}

#allGraph{
width:100%;
height:300px;
}

#legend{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.legend-item{
cursor:pointer;
padding:5px 10px;
border:1px solid #a855f7;
color:#c084fc;
border-radius:5px;
font-size:14px;
}

.legend-item:hover{
background:#7e22ce;
color:white;
}

.legend-item.hidden-stock{
opacity: 0.5;
border-style: dashed;
}

#tooltip{
position:fixed;
background:rgba(20,0,40,0.95);
border:1px solid #a855f7;
padding:8px;
color:#e9d5ff;
font-size:14px;
pointer-events:none;
display:none;
z-index:1000;
box-shadow:0 0 20px #7e22ce;
}

#nicknameScreen{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

input{
padding:10px;
font-size:18px;
background:black;
border:1px solid #a855f7;
color:white;
}

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-999;
pointer-events:none;
}

#achievementScreen{
position:fixed;
inset:0;
background:black;
padding:40px;
z-index:3000;
overflow:auto;
display:none;
}

.achievement{
border:1px solid #a855f7;
padding:10px;
margin:10px;
border-radius:10px;
}

#notificationContainer {
position:fixed;
bottom:20px;
right:20px;
z-index:5000;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

#gachaScreen{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:4000;
}

#gachaResult{
font-size:40px;
margin:20px;
text-shadow:0 0 20px #a855f7;
}

#mintScreen{
position:fixed;
inset:0;
background:black;
display:none;
padding:40px;
z-index:4000;
}

.mintItem{
border:1px solid #a855f7;
padding:10px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>
<canvas id="bgCanvas"></canvas>

<div id="nicknameScreen">
<h1>SPACE STOCK</h1>
<p>ニックネームを入力</p>
<input id="nicknameInput" placeholder="名無しトレーダー">
<button onclick="startGame()">START</button>
</div>

<div id="game" style="display:none;">
<h1>SPACE STOCK MARKET</h1>
<button onclick="openAchievements()">🏆 実績</button>
<button onclick="openGacha()">🎰 ガチャ</button>
<button onclick="openMint()">💎 ミント</button>

<p>👤 <span id="playerName"></span></p>
<p>💰 所持金: <span id="money"></span>G</p>
<p>⭐ ポイント: <span id="points"></span></p>
<p>💎 ミント: <span id="mint"></span></p>
<p>⏳ 次の変動まで: <span id="timer"></span></p>

<h2>📊 全銘柄グラフ</h2>
<canvas id="allGraph"></canvas>
<div id="legend"></div>
<div id="stocks"></div>
</div>

<div id="tooltip"></div>
<div id="notificationContainer"></div>

<div id="achievementScreen">
<h2>🏆 実績</h2>
<div id="achievementList"></div>
<button onclick="closeAchievements()">閉じる</button>
</div>

<div id="gachaScreen">
<h2>🎰 SPACE GACHA</h2>
<div id="gachaResult">READY</div>
<button id="gachaBtn" onclick="spinGacha()">回す (50ミント)</button>
<button onclick="closeGacha()">閉じる</button>
</div>

<div id="mintScreen">
<h2>💎 ミントコレクション</h2>
<div id="mintList"></div>
<button onclick="closeMint()">閉じる</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("spaceStockData")) || null;
let timerInterval = null;
let priceCheckTimeout = null;
let isGachaSpinning = false;

// 新しい株の固有データ（名前・初期価格・性格）
const stockTemplates = [
    { name: "アストロ通信", basePrice: 300, personality: "【安定】インフラ系。値動きが緩やか。" },
    { name: "スターダスト鉱業", basePrice: 500, personality: "【資源】宇宙資源の発掘。堅実に伸びる。" },
    { name: "ワープドライブ社", basePrice: 1200, personality: "【成長】新技術ベンチャー。期待値が高い。" },
    { name: "オールドアース不動産", basePrice: 2000, personality: "【衰退】旧地球の土地管理。下落気味。" },
    { name: "ギャラクシー・バイオ", basePrice: 800, personality: "【バブル】医療系。乱高下が激しい。" },
    { name: "AIコア・システムズ", basePrice: 3500, personality: "【安定】AI管理の巨大企業。高値安定。" },
    { name: "未知文明発掘", basePrice: 100, personality: "【超危険】ギャンブル銘柄。紙屑か宝か。" },
    { name: "クアンタム・エナジー", basePrice: 2500, personality: "【成長】次世代エネルギー。着実な成長。" },
    { name: "スペース・ツーリズム", basePrice: 600, personality: "【流行】宇宙旅行サービス。トレンド次第。" },
    { name: "オメガ・ホールディングス", basePrice: 10000, personality: "【覇者】宇宙経済を牛耳る超大企業。" }
];

// 古いセーブデータとの互換性パッチ
if(data){
    if(!data.achievementsUnlocked) data.achievementsUnlocked = [];
    if(!data.mintInventory) data.mintInventory = {};
    if(data.totalBuys === undefined) data.totalBuys = 0;
    if(data.mint === undefined) data.mint = 0;
    if(data.gachaCount === undefined) data.gachaCount = 0; // 新規追加：ガチャ回数
    
    data.stocks.forEach((stock, i) => {
        if(stock.buyPrice === undefined) stock.buyPrice = stock.price;
        if(stock.unlockCost === undefined) stock.unlockCost = 500 + i * 300;
        if(stock.history === undefined) stock.history = [stock.price];
        
        // 古い「STOCK-〇」という名前なら、新しい名前にアップデート（価格はそのまま引き継ぐ）
        if(stock.name.startsWith("STOCK-")) {
            stock.name = stockTemplates[i].name;
            stock.personality = stockTemplates[i].personality;
        }
    });
} else {
    data={
        nickname:"",
        money:10000,
        points:0,
        mint:0,
        mintInventory:{},
        stocks:[],
        lastUpdate:Date.now(),
        totalBuys:0,
        gachaCount:0, // 新規追加：ガチャ回数
        achievementsUnlocked:[]
    };

    for(let i=0;i<10;i++){
        let template = stockTemplates[i];
        // 基礎価格を中心に少しだけランダムにばらけさせる
        let initialPrice = Math.floor(template.basePrice * (0.9 + Math.random() * 0.2));

        data.stocks.push({
            name: template.name,
            price: initialPrice,
            owned: 0,
            unlocked: i < 3,
            unlockCost: 500 + i * 300,
            personality: template.personality,
            history: [initialPrice],
            buyPrice: 0,
            canSell: true,
            visible: true
        });
    }
    save();
}

function save(){
    localStorage.setItem("spaceStockData",JSON.stringify(data));
}

function startGame(){
    let name=document.getElementById("nicknameInput").value;

    if(name.trim()=="" && data.nickname){
        name=data.nickname;
    }
    
    if(name.trim()=="") {
        name = "名無しトレーダー";
    }

    data.nickname=name;
    save();

    document.getElementById("nicknameScreen").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("playerName").innerText=data.nickname;

    checkAchievements(); // 名前入力時の実績チェック用
    updateUI();
    startTimers();
}

function startTimers(){
    if(!timerInterval) timerInterval = setInterval(updateTimer,1000);
    if(!priceCheckTimeout) checkPriceUpdate();
}

function updateUI(){
    document.getElementById("money").innerText=data.money;
    document.getElementById("points").innerText=data.points;
    document.getElementById("mint").innerText=data.mint;

    const stocksDiv=document.getElementById("stocks");
    stocksDiv.innerHTML="";

    data.stocks.forEach((stock,i)=>{
        const card=document.createElement("div");
        card.className="card"+(stock.unlocked?"":" locked");

        let profitDisplay = "";
        if(stock.owned > 0 && stock.buyPrice > 0){
            let diff = stock.price - stock.buyPrice;
            let sign = diff >= 0 ? "+" : "";
            let color = diff >= 0 ? "lime" : "red";
            profitDisplay = `<span style="color:${color}; font-size:12px;">(${sign}${diff}G/株)</span>`;
        }

        card.innerHTML=`
            <h3 style="margin: 0 0 5px 0; font-size:18px;">${stock.name}</h3>
            <p style="font-size:11px; color:#c084fc; margin-top:0; height:30px;">${stock.personality}</p>
            <p>現在値: ${stock.price}G ${profitDisplay}</p>
            <p>保有: ${stock.owned}株</p>
        `;

        if(stock.unlocked){
            const btnGroup = document.createElement("div");
            
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button");
                btn.innerText="買 "+n;
                btn.onclick=()=>buyStock(i,n);
                if(data.money < stock.price * n) btn.disabled = true;
                btnGroup.appendChild(btn);
            });
            card.appendChild(btnGroup);

            const btnGroupSell = document.createElement("div");
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button");
                btn.innerText="売 "+n;
                btn.onclick=()=>sellStock(i,n);
                if(stock.owned<n) btn.disabled=true;
                btnGroupSell.appendChild(btn);
            });
            card.appendChild(btnGroupSell);
        }else{
            const unlockBtn=document.createElement("button");
            unlockBtn.className="unlockBtn";
            unlockBtn.innerText=stock.unlockCost+"Pで解放";
            
            if(data.points >= stock.unlockCost){
                unlockBtn.disabled = false;
                unlockBtn.onclick=()=>unlockStock(i);
            } else {
                unlockBtn.disabled = true;
                unlockBtn.style.animation = "none";
            }
            card.appendChild(unlockBtn);
        }
        stocksDiv.appendChild(card);
    });

    drawAllGraph();
    drawLegend();
    checkAchievements();
    save();
}

function buyStock(i,amount){
    const stock=data.stocks[i];
    const cost=stock.price*amount;

    if(data.money<cost) return;

    data.money-=cost;
    
    if(stock.owned === 0) {
        stock.buyPrice = stock.price;
    } else {
        stock.buyPrice = Math.floor(((stock.buyPrice * stock.owned) + cost) / (stock.owned + amount));
    }
    
    stock.owned+=amount;
    data.totalBuys++;

    updateUI();
}

function sellStock(i,amount){
    const stock=data.stocks[i];
    if(stock.owned<amount) return;

    const sellPrice = stock.price;
    const profit = (sellPrice - stock.buyPrice) * amount;

    data.money += sellPrice * amount;

    if(profit > 0){
        const mintGain = Math.max(1, Math.floor(profit / 10));
        data.mint += mintGain;
    }

    stock.owned-=amount;
    if(stock.owned === 0) stock.buyPrice = 0;

    updateUI();
}

function unlockStock(i){
    if(data.points>=data.stocks[i].unlockCost){
        data.points-=data.stocks[i].unlockCost;
        data.stocks[i].unlocked=true;
        updateUI();
    }
}

function checkPriceUpdate(){
    const now=Date.now();
    const elapsed = now - data.lastUpdate;

    if(elapsed >= 60000){
        let updates = Math.floor(elapsed / 60000);
        if (updates > 30) updates = 30;
        
        for(let i=0; i<updates; i++){
            updatePrices(true);
        }
        data.lastUpdate = now - (elapsed % 60000);
        updateUI();
    }
    
    priceCheckTimeout = setTimeout(checkPriceUpdate, 1000);
}

function updatePrices(skipUI = false){
    data.stocks.forEach(stock=>{
        // 基礎価格に基づいて変動幅を変える（高い株ほど大きく動く）
        let volatility = stock.price * 0.05; 
        let change = (Math.random() - 0.5) * volatility;
        stock.price = Math.max(10, Math.floor(stock.price + change));
        stock.history.push(stock.price);
        if(stock.history.length>30) stock.history.shift();
    });

    data.points+=100;
    if(!skipUI) updateUI();
}

function updateTimer(){
    const remain=60000-(Date.now()-data.lastUpdate);
    const sec=Math.max(0,Math.floor(remain/1000));
    document.getElementById("timer").innerText=sec+"秒";
}

function drawAllGraph(){
    const canvas=document.getElementById("allGraph");
    const ctx=canvas.getContext("2d");

    canvas.width=canvas.clientWidth;
    canvas.height=300;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const colors=["cyan","lime","yellow","orange","red","magenta","white","blue","pink","lightgreen"];

    data.stocks.forEach((stock,index)=>{
        if(!stock.visible || !stock.history || stock.history.length === 0) return;

        const max=Math.max(...stock.history, 1);
        const min=Math.min(...stock.history, 0);
        let range = max - min;
        if(range === 0) range = 1; 

        ctx.beginPath();
        ctx.strokeStyle=colors[index];
        ctx.lineWidth=2;

        if(stock.history.length === 1){
            const y = canvas.height - ((stock.history[0] - min) / range) * canvas.height;
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
        } else {
            stock.history.forEach((price,i)=>{
                const x=(i/(stock.history.length-1))*canvas.width;
                const y=canvas.height-((price-min)/range)*canvas.height;
                if(i==0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            });
        }
        ctx.stroke();
    });
}

function drawLegend(){
    const legend=document.getElementById("legend");
    legend.innerHTML="";

    data.stocks.forEach((stock,i)=>{
        const item=document.createElement("div");
        item.className="legend-item" + (stock.visible ? "" : " hidden-stock");
        item.innerText=stock.name;

        item.onclick=()=>{
            stock.visible=!stock.visible;
            updateUI();
        };
        legend.appendChild(item);
    });
}

// 追加された新しい実績
const achievements=[
    {name:"初投資",desc:"株を1回買う",check:()=>data.totalBuys>=1},
    {name:"トレーダー",desc:"100回購入",check:()=>data.totalBuys>=100},
    {name:"投資家",desc:"500回購入",check:()=>data.totalBuys>=500},
    {name:"資産家",desc:"2,000,000G",check:()=>data.money>=2000000},
    {name:"大富豪",desc:"1,000,000,000G",check:()=>data.money>=1000000000},
    {name:"株コレクター",desc:"1つの株を100株保有",check:()=>data.stocks.some(s=>s.owned>=100)},
    {name:"宇宙投資家",desc:"全株解放",check:()=>data.stocks.every(s=>s.unlocked)},
    {name:"ミント収集家",desc:"100ミント到達",check:()=>data.mint>=100},
    {name:"ミント王",desc:"10,000ミント到達",check:()=>data.mint>=10000},
    {name:"伝説トレーダー",desc:"10,000,000,000G",check:()=>data.money>=10000000000},
    {name:"ガチャ体験",desc:"ガチャでミントを1個獲得",check:()=>data.gachaCount>=1},
    {name:"ミント好き",desc:"ガチャでミントを10個獲得",check:()=>data.gachaCount>=10},
    {name:"ガチャジャンキー",desc:"ガチャでミントを100個獲得",check:()=>data.gachaCount>=100},
    {name:"隠し: UME&TUKE",hidden:true,check:()=>data.nickname==="UME&TUKE"},
    {name:"ブラックホール",hidden:true,check:()=>data.money<0},
    {name:"ギャンブラー",hidden:true,check:()=>data.totalBuys>=500},
    {name:"ミント神",hidden:true,check:()=>data.mint>=50000},
    {name:"宇宙覇者",hidden:true,check:()=>data.money>=1000000000000},
    {name:"株マスター",hidden:true,check:()=>data.stocks.every(s=>s.owned>0)}
];

function checkAchievements(){
    if(!data.achievementsUnlocked) return;
    
    achievements.forEach((a,i)=>{
        if(a.check() && !data.achievementsUnlocked.includes(i)){
            data.achievementsUnlocked.push(i);
            showAchievement(a.name);
        }
    });
}

function openAchievements(){
    document.getElementById("achievementScreen").style.display="block";
    const list=document.getElementById("achievementList");
    list.innerHTML="";

    achievements.forEach((a,i)=>{
        const div=document.createElement("div");
        div.className="achievement";
        if(data.achievementsUnlocked.includes(i)){
            div.innerText=a.name+" - "+(a.hidden ? "隠し実績解除！" : a.desc);
        }else{
            div.innerText="？？？？？？？？";
        }
        list.appendChild(div);
    });
}

function closeAchievements(){
    document.getElementById("achievementScreen").style.display="none";
}

function showAchievement(name){
    const container = document.getElementById("notificationContainer");
    
    const popup = document.createElement("div");
    popup.style.background = "rgba(126, 34, 206, 0.95)";
    popup.style.border = "1px solid #a855f7";
    popup.style.padding = "15px";
    popup.style.borderRadius = "10px";
    popup.style.boxShadow = "0 0 20px #a855f7";
    popup.style.color = "white";
    popup.style.fontWeight = "bold";
    popup.style.opacity = "0";
    popup.style.transform = "translateX(100px)";
    popup.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    popup.innerText = "🏆 実績解除: " + name;
    
    container.appendChild(popup);
    
    setTimeout(() => {
        popup.style.opacity = "1";
        popup.style.transform = "translateX(0)";
    }, 10);
    
    setTimeout(() => {
        popup.style.opacity = "0";
        popup.style.transform = "translateX(100px)";
        setTimeout(() => popup.remove(), 500);
    }, 4000);
}

function openGacha(){
    document.getElementById("gachaScreen").style.display="flex";
}

function closeGacha(){
    if(isGachaSpinning) return;
    document.getElementById("gachaScreen").style.display="none";
}

// 排出率を調整した新しいミントテーブル（合計100%）
const mintTable = [
    {name:"ベーシックミント",rate:15},
    {name:"ウォーターミント",rate:5},
    {name:"チョコチップミント",rate:4},
    {name:"ブラッドミント",rate:1},
    {name:"ブルーミント",rate:20},
    {name:"レッドミント",rate:20},
    {name:"グリーンミント",rate:20},
    {name:"パープルミント",rate:8},
    {name:"ゴールドミント",rate:5},
    {name:"ギャラクシーミント",rate:0.5},
    {name:"ブラックホールミント",rate:1.5}
];
    
function spinGacha(){
    if(isGachaSpinning) return;
    if(data.mint < 50){
        alert("ミントが足りません");
        return;
    }

    data.mint -= 50;
    isGachaSpinning = true;
    updateUI();
    document.getElementById("gachaBtn").disabled = true;

    const resultBox=document.getElementById("gachaResult");
    const names=mintTable.map(m=>m.name);
    let count=0;

    const anim=setInterval(()=>{
        resultBox.innerText=names[Math.floor(Math.random()*names.length)];
        count++;

        if(count>20){
            clearInterval(anim);
            let rand=Math.random()*100;
            let total=0;
            let result="";

            for(let m of mintTable){
                total+=m.rate;
                if(rand<=total){
                    result=m.name;
                    break;
                }
            }

            if(!data.mintInventory[result]) data.mintInventory[result]=0;
            data.mintInventory[result]++;
            data.gachaCount++; // ガチャ回数をカウント
            
            resultBox.innerText="✨ "+result+" ✨";
            
            isGachaSpinning = false;
            document.getElementById("gachaBtn").disabled = false;
            
            checkAchievements(); // 実績の判定
            save(); // セーブ
        }
    },80);
}

function openMint(){
    document.getElementById("mintScreen").style.display="block";
    const list=document.getElementById("mintList");
    list.innerHTML="";

    let hasMint = false;
    for(let m in data.mintInventory){
        hasMint = true;
        const div=document.createElement("div");
        div.className="mintItem";
        div.innerText=m+" : "+data.mintInventory[m]+"個";
        list.appendChild(div);
    }
    
    if(!hasMint) {
        list.innerHTML="<p>まだミントを持っていません。株で利益を出してガチャを回そう！</p>";
    }
}

function closeMint(){
    document.getElementById("mintScreen").style.display="none";
}
    
window.addEventListener("load",()=>{
    if(data && data.nickname){
        document.getElementById("nicknameScreen").style.display="none";
        document.getElementById("game").style.display="block";
        document.getElementById("playerName").innerText=data.nickname;
        updateUI();
        startTimers();
    }
});
</script>
</body>
