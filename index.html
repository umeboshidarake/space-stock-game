<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SPACE STOCK</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#140a2a,#000);
color:white;
overflow-x:hidden;
}

h1{
text-align:center;
font-size:40px;
color:#e9d5ff;
text-shadow:0 0 25px #a855f7,0 0 50px #7e22ce;
}

#game{
padding:20px;
max-width: 1200px;
margin: 0 auto;
}

.menu-bar {
display: flex;
flex-wrap: wrap;
gap: 15px;
margin-bottom: 20px;
justify-content: center;
}

.menu-btn {
background: linear-gradient(45deg, #1f0b3b, #3b0764);
border: 2px solid #a855f7;
color: #e9d5ff;
padding: 10px 20px;
font-size: 16px;
font-weight: bold;
border-radius: 8px;
cursor: pointer;
text-transform: uppercase;
letter-spacing: 1px;
box-shadow: 0 0 10px rgba(168, 85, 247, 0.3), inset 0 0 10px rgba(168, 85, 247, 0.2);
transition: all 0.3s ease;
display: flex;
align-items: center;
gap: 8px;
}

.menu-btn:hover:not(:disabled) {
background: linear-gradient(45deg, #3b0764, #7e22ce);
box-shadow: 0 0 20px #a855f7, inset 0 0 15px #c084fc;
transform: translateY(-2px);
color: white;
}

.menu-btn:disabled {
opacity: 0.5;
cursor: not-allowed;
}

/* 破壊ボタン専用スタイル */
.destroy-btn {
border-color: #ef4444;
color: #fca5a5;
box-shadow: 0 0 10px rgba(239, 68, 68, 0.3), inset 0 0 10px rgba(239, 68, 68, 0.2);
}
.destroy-btn:hover:not(:disabled) {
background: linear-gradient(45deg, #7f1d1d, #b91c1c);
box-shadow: 0 0 20px #ef4444, inset 0 0 15px #f87171;
color: white;
}

.status-bar {
display: flex;
flex-wrap: wrap;
gap: 20px;
background: rgba(255,255,255,0.05);
padding: 15px;
border-radius: 10px;
border: 1px solid rgba(168,85,247,0.3);
margin-bottom: 20px;
font-size: 18px;
}

#buffStatus {
color: #c084fc;
font-weight: bold;
margin-bottom: 10px;
min-height: 24px;
}

#stocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap: 15px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid #a855f7;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px rgba(168,85,247,0.3);
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 0 30px rgba(168,85,247,0.6);
}

.card-actions {
display: flex;
flex-direction: column;
gap: 5px;
margin-top: 10px;
}

.btn-group {
display: flex;
gap: 5px;
}

button{
background:black;
border:1px solid #a855f7;
color:#c084fc;
padding:6px 10px;
cursor:pointer;
transition:0.3s;
border-radius: 4px;
flex: 1;
}

button:hover:not(:disabled){
background:#a855f7;
color:black;
box-shadow:0 0 10px #a855f7;
}

button:disabled{
border-color:#444;
color:#666;
cursor:not-allowed;
box-shadow:none;
}

.unlockBtn{
width: 100%;
padding: 10px;
font-weight: bold;
animation:unlockGlow 1.5s infinite alternate;
}

@keyframes unlockGlow{
from{box-shadow:0 0 5px #a855f7;}
to{box-shadow:0 0 20px #a855f7;}
}

.locked{
opacity:0.4;
filter: grayscale(0.8);
}

canvas{
background:rgba(0,0,0,0.5);
border:1px solid rgba(168,85,247,0.3);
border-radius: 10px;
margin-top:10px;
}

#allGraph{
width:100%;
height:300px;
}

#legend{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top: 10px;
margin-bottom:20px;
}

.legend-item{
cursor:pointer;
padding:5px 10px;
border:1px solid #a855f7;
color:#c084fc;
border-radius:5px;
font-size:14px;
transition: 0.2s;
}

.legend-item:hover{
background:#7e22ce;
color:white;
}

.legend-item.hidden-stock{
opacity: 0.4;
border-style: dashed;
}

#notificationContainer {
position:fixed;
bottom:20px;
right:20px;
z-index:5000;
display:flex;
flex-direction:column;
gap:10px;
pointer-events:none;
}

.modal-screen {
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
backdrop-filter: blur(5px);
padding:40px;
z-index:3000;
overflow:auto;
display:none;
flex-direction:column;
align-items:center;
}

.modal-content {
background: #110622;
border: 2px solid #a855f7;
border-radius: 15px;
padding: 30px;
width: 80%;
max-width: 600px;
box-shadow: 0 0 40px rgba(168,85,247,0.4);
}

.modal-close {
margin-top: 20px;
padding: 10px 30px;
font-size: 16px;
background: transparent;
}

.list-item {
border:1px solid #a855f7;
padding:15px;
margin-bottom:10px;
border-radius:10px;
background: rgba(255,255,255,0.02);
display: flex;
justify-content: space-between;
align-items: center;
}

select {
background: black;
color: white;
border: 1px solid #a855f7;
padding: 10px;
font-size: 16px;
border-radius: 5px;
width: 100%;
margin-bottom: 15px;
}
</style>
</head>

<body>

<div id="nicknameScreen" style="position:fixed;inset:0;background:black;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:9999;">
<h1>SPACE STOCK</h1>
<p>ニックネームを入力</p>
<input id="nicknameInput" placeholder="名無しトレーダー" style="padding:10px;font-size:18px;background:black;border:1px solid #a855f7;color:white;margin-bottom:20px;">
<button onclick="startGame()" style="padding:10px 30px;font-size:18px;">START</button>
</div>

<div id="game" style="display:none;">
<h1>SPACE STOCK MARKET</h1>
<p>👤 <span id="playerName"></span></p>

<div class="menu-bar">
    <button class="menu-btn" onclick="openAchievements()">🏆 実績</button>
    <button class="menu-btn" onclick="openGacha()">🎰 ガチャ</button>
    <button class="menu-btn" onclick="openMint()">💎 ミント</button>
    <button class="menu-btn" onclick="openBrew()">🧪 醸造</button>
    <button class="menu-btn" onclick="openBag()">🎒 バッグ</button>
    <button class="menu-btn destroy-btn" onclick="openDestroy()">💥 破壊</button>
</div>

<div class="status-bar">
    <div>💰 所持金: <span id="money"></span>G</div>
    <div>⭐ ポイント: <span id="points"></span></div>
    <div>💎 ミント: <span id="mint"></span></div>
    <div>👽 異星のミント: <span id="alienMints"></span></div>
    <div>⏳ 変動まで: <span id="timer"></span></div>
</div>

<div id="buffStatus"></div>

<h2>📊 全銘柄グラフ</h2>
<canvas id="allGraph"></canvas>
<div id="legend"></div>
<div id="stocks"></div>
</div>

<div id="notificationContainer"></div>

<div id="achievementScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0; color:#e9d5ff;">🏆 実績</h2>
        <div id="achievementList"></div>
        <button class="modal-close" onclick="closeScreen('achievementScreen')">閉じる</button>
    </div>
</div>

<div id="gachaScreen" class="modal-screen">
    <div class="modal-content" style="text-align:center;">
        <h2 style="margin-top:0;">🎰 SPACE GACHA</h2>
        <div id="gachaResult" style="font-size:40px; margin:30px 0; text-shadow:0 0 20px #a855f7;">READY</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="gachaBtn" class="menu-btn" onclick="spinGacha(1)">1回 (20ミント)</button>
            <button id="gacha10Btn" class="menu-btn" onclick="spinGacha(10)">10連 (200ミント)</button>
        </div>
        <button class="modal-close" onclick="closeScreen('gachaScreen')">閉じる</button>
    </div>
</div>

<div id="mintScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0;">💎 ミントコレクション</h2>
        <div id="mintList"></div>
        <button class="modal-close" onclick="closeScreen('mintScreen')">閉じる</button>
    </div>
</div>

<div id="brewScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0;">🧪 ポーション醸造</h2>
        <p>ベーシックミント×1 と、任意のミント×2 を消費してポーションを作ります。</p>
        <p style="color:#c084fc;">所持ベーシックミント: <span id="basicMintCount">0</span></p>
        
        <label>追加素材 1:</label>
        <select id="brewMat1"></select>

        <label>追加素材 2:</label>
        <select id="brewMat2"></select>

        <button class="menu-btn" style="width:100%; justify-content:center; margin-top:10px;" onclick="doBrew()">✨ 醸造する ✨</button>
        <button class="modal-close" onclick="closeScreen('brewScreen')">閉じる</button>
    </div>
</div>

<div id="bagScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0;">🎒 バッグ (ポーション)</h2>
        <div id="bagList"></div>
        <button class="modal-close" onclick="closeScreen('bagScreen')">閉じる</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("spaceStockData")) || null;
let timerInterval = null;
let priceCheckTimeout = null;
let isGachaSpinning = false;

const stockTemplates = [
    { name: "アストロ通信", basePrice: 300, personality: "【安定】インフラ系。値動きが緩やか。" },
    { name: "スターダスト鉱業", basePrice: 500, personality: "【資源】宇宙資源の発掘。堅実に伸びる。" },
    { name: "ワープドライブ社", basePrice: 1200, personality: "【成長】新技術ベンチャー。期待値が高い。" },
    { name: "オールドアース不動産", basePrice: 2000, personality: "【衰退】旧地球の土地管理。下落気味。" },
    { name: "ギャラクシー・バイオ", basePrice: 800, personality: "【バブル】医療系。乱高下が激しい。" },
    { name: "AIコア・システムズ", basePrice: 3500, personality: "【安定】AI管理の巨大企業。高値安定。" },
    { name: "未知文明発掘", basePrice: 100, personality: "【超危険】ギャンブル銘柄。紙屑か宝か。" },
    { name: "クアンタム・エナジー", basePrice: 2500, personality: "【成長】次世代エネルギー。着実な成長。" },
    { name: "スペース・ツーリズム", basePrice: 600, personality: "【流行】宇宙旅行サービス。トレンド次第。" },
    { name: "オメガ・ホールディングス", basePrice: 10000, personality: "【覇者】宇宙経済を牛耳る超大企業。" }
];

const potionEffects = {
    "💰 黄金の雫": { desc: "所持金即座に +100,000G", type: "instant", action: () => { data.money += 100000; } },
    "⭐ 知識の霊薬": { desc: "ポイント即座に +5,000P", type: "instant", action: () => { data.points += 5000; } },
    "📈 ハイパードライブ薬": { desc: "3分間、株価の変動幅が2倍になる", type: "buff", duration: 180000 },
    "🛡 プロテクトジェル": { desc: "3分間、株価下落時の下落幅を半減", type: "buff", duration: 180000 },
    "💎 ミントブースト": { desc: "3分間、売却時のミント獲得量2倍", type: "buff", duration: 180000 },
    "🚀 ギャラクシーブル": { desc: "3分間、市場が「好景気」になり株価が上がりやすくなる", type: "buff", duration: 180000 },
    "⏳ タイムワープ薬": { desc: "時間を進め、即座に20回分の価格変動を起こす", type: "instant", action: () => {
        for(let i=0; i<20; i++) updatePrices(true);
        updateUI();
    }},
    "✨ 奇跡の雫": { desc: "所持金 +1,000,000G、ポイント +50,000P を得る", type: "instant", action: () => { data.money += 1000000; data.points += 50000; } },
    "❓ 異質なポーション": { desc: "2分間、世界を「破壊」する権利を得る...", type: "buff", duration: 120000 }
};

if(data){
    if(!data.achievementsUnlocked) data.achievementsUnlocked = [];
    if(!data.mintInventory) data.mintInventory = {};
    if(data.totalBuys === undefined) data.totalBuys = 0;
    if(data.mint === undefined) data.mint = 0;
    if(data.gachaCount === undefined) data.gachaCount = 0;
    if(!data.potions) data.potions = {};
    if(!data.activeBuffs) data.activeBuffs = {};
    
    // 新機能用の変数初期化
    if(data.brewCount === undefined) data.brewCount = 0;
    if(data.alienPotionCount === undefined) data.alienPotionCount = 0;
    if(data.alienMints === undefined) data.alienMints = 0;
    
    // 互換性パッチ
    if(data.mintInventory["宇宙ミント"]){
        data.mintInventory["ギャラクシーミント"] = (data.mintInventory["ギャラクシーミント"] || 0) + data.mintInventory["宇宙ミント"];
        delete data.mintInventory["宇宙ミント"];
    }

    data.stocks.forEach((stock, i) => {
        if(stock.buyPrice === undefined) stock.buyPrice = stock.price;
        if(stock.unlockCost === undefined) stock.unlockCost = 500 + i * 300;
        if(stock.history === undefined) stock.history = [stock.price];
        if(stock.name.startsWith("STOCK-")) {
            stock.name = stockTemplates[i].name;
            stock.personality = stockTemplates[i].personality;
        }
    });
} else {
    data={
        nickname:"", money:10000, points:0, mint:0,
        mintInventory:{}, potions:{}, activeBuffs:{}, stocks:[],
        lastUpdate:Date.now(), totalBuys:0, gachaCount:0, achievementsUnlocked:[],
        brewCount:0, alienPotionCount:0, alienMints:0
    };

    for(let i=0;i<10;i++){
        let template = stockTemplates[i];
        let initialPrice = Math.floor(template.basePrice * (0.9 + Math.random() * 0.2));
        data.stocks.push({
            name: template.name, price: initialPrice, owned: 0,
            unlocked: i < 3, unlockCost: 500 + i * 300,
            personality: template.personality, history: [initialPrice],
            buyPrice: 0, canSell: true, visible: true
        });
    }
    save();
}

function save(){
    localStorage.setItem("spaceStockData",JSON.stringify(data));
}

function startGame(){
    let name=document.getElementById("nicknameInput").value;
    if(name.trim()=="" && data.nickname) name=data.nickname;
    if(name.trim()=="") name = "名無しトレーダー";
    data.nickname=name;
    save();

    document.getElementById("nicknameScreen").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("playerName").innerText=data.nickname;

    checkAchievements();
    updateUI();
    startTimers();
}

function startTimers(){
    if(!timerInterval) timerInterval = setInterval(updateTimer,1000);
    if(!priceCheckTimeout) checkPriceUpdate();
}

function updateUI(){
    document.getElementById("money").innerText=data.money.toLocaleString();
    document.getElementById("points").innerText=data.points.toLocaleString();
    document.getElementById("mint").innerText=data.mint.toLocaleString();
    document.getElementById("alienMints").innerText = (data.alienMints || 0).toLocaleString();

    const stocksDiv=document.getElementById("stocks");
    stocksDiv.innerHTML="";

    data.stocks.forEach((stock,i)=>{
        const card=document.createElement("div");
        card.className="card"+(stock.unlocked?"":" locked");

        let profitDisplay = "";
        if(stock.owned > 0 && stock.buyPrice > 0){
            let diff = stock.price - stock.buyPrice;
            // 異星のミントの恩恵をUIにも表示
            if(diff > 0 && data.alienMints > 0){
                let bonus = Math.floor(diff * 0.02 * data.alienMints);
                diff += bonus; 
            }
            let sign = diff >= 0 ? "+" : "";
            let color = diff >= 0 ? "lime" : "red";
            profitDisplay = `<span style="color:${color}; font-size:12px;">(${sign}${diff.toLocaleString()}G/株)</span>`;
        }

        card.innerHTML=`
            <h3 style="margin: 0 0 5px 0; font-size:18px;">${stock.name}</h3>
            <p style="font-size:11px; color:#c084fc; margin-top:0; height:30px;">${stock.personality}</p>
            <p style="font-size:18px; font-weight:bold; margin:5px 0;">現在値: ${stock.price.toLocaleString()}G ${profitDisplay}</p>
            <p style="margin:5px 0;">保有: ${stock.owned.toLocaleString()}株</p>
        `;

        if(stock.unlocked){
            const actions = document.createElement("div");
            actions.className = "card-actions";

            const btnGroup = document.createElement("div");
            btnGroup.className = "btn-group";
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button");
                btn.innerText="買 "+n;
                btn.onclick=()=>buyStock(i,n);
                if(data.money < stock.price * n) btn.disabled = true;
                btnGroup.appendChild(btn);
            });
            actions.appendChild(btnGroup);

            const btnGroupSell = document.createElement("div");
            btnGroupSell.className = "btn-group";
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button");
                btn.innerText="売 "+n;
                btn.onclick=()=>sellStock(i,n);
                if(stock.owned<n) btn.disabled=true;
                btnGroupSell.appendChild(btn);
            });
            actions.appendChild(btnGroupSell);
            
            card.appendChild(actions);
        }else{
            const unlockBtn=document.createElement("button");
            unlockBtn.className="unlockBtn";
            unlockBtn.innerText=stock.unlockCost.toLocaleString()+"Pで解放";
            
            if(data.points >= stock.unlockCost){
                unlockBtn.disabled = false;
                unlockBtn.onclick=()=>unlockStock(i);
            } else {
                unlockBtn.disabled = true;
                unlockBtn.style.animation = "none";
            }
            card.appendChild(unlockBtn);
        }
        stocksDiv.appendChild(card);
    });

    drawAllGraph();
    drawLegend();
    checkAchievements();
    save();
}

function buyStock(i,amount){
    const stock=data.stocks[i];
    const cost=stock.price*amount;
    if(data.money<cost) return;

    data.money-=cost;
    if(stock.owned === 0) stock.buyPrice = stock.price;
    else stock.buyPrice = Math.floor(((stock.buyPrice * stock.owned) + cost) / (stock.owned + amount));
    
    stock.owned+=amount;
    data.totalBuys++;
    updateUI();
}

function sellStock(i,amount){
    const stock=data.stocks[i];
    if(stock.owned<amount) return;

    const sellPrice = stock.price;
    const diff = sellPrice - stock.buyPrice;
    let bonus = 0;
    
    // 異星のミントの効果計算（売却益の増加）
    if(diff > 0 && data.alienMints > 0) {
        bonus = Math.floor(diff * 0.02 * data.alienMints);
    }

    const totalSaleValue = (sellPrice + bonus) * amount;
    data.money += totalSaleValue;

    const totalProfit = (diff + bonus) * amount;
    if(totalProfit > 0){
        let mintGain = Math.max(1, Math.floor(totalProfit / 10));
        if(isBuffActive("💎 ミントブースト")) mintGain *= 2;
        data.mint += mintGain;
    }

    stock.owned-=amount;
    if(stock.owned === 0) stock.buyPrice = 0;
    updateUI();
}

function unlockStock(i){
    if(data.points>=data.stocks[i].unlockCost){
        data.points-=data.stocks[i].unlockCost;
        data.stocks[i].unlocked=true;
        updateUI();
    }
}

function checkPriceUpdate(){
    const now=Date.now();
    const elapsed = now - data.lastUpdate;

    if(elapsed >= 60000){
        let updates = Math.floor(elapsed / 60000);
        if (updates > 30) updates = 30;
        
        for(let i=0; i<updates; i++){ updatePrices(true); }
        data.lastUpdate = now - (elapsed % 60000);
        updateUI();
    }
    priceCheckTimeout = setTimeout(checkPriceUpdate, 1000);
}

function updatePrices(skipUI = false){
    const isHyper = isBuffActive("📈 ハイパードライブ薬");
    const isProtect = isBuffActive("🛡 プロテクトジェル");
    const isBull = isBuffActive("🚀 ギャラクシーブル");

    data.stocks.forEach(stock=>{
        let volatility = stock.price * 0.05; 
        if(isHyper) volatility *= 2;

        let change = (Math.random() - 0.5) * volatility;
        
        if(isBull) change = (Math.random() - 0.2) * volatility; 
        if(change < 0 && isProtect) change *= 0.5;

        stock.price = Math.max(10, Math.floor(stock.price + change));
        stock.history.push(stock.price);
        if(stock.history.length>30) stock.history.shift();
    });

    data.points+=100;
    if(!skipUI) updateUI();
}

function updateTimer(){
    const now = Date.now();
    const remain=60000-(now-data.lastUpdate);
    const sec=Math.max(0,Math.floor(remain/1000));
    document.getElementById("timer").innerText=sec+"秒";

    let buffText = "";
    for(let buff in data.activeBuffs){
        if(data.activeBuffs[buff] > now){
            let remainBuff = Math.floor((data.activeBuffs[buff] - now) / 1000);
            buffText += `<span style="margin-right:15px; display:inline-block;">${buff}: 残り ${remainBuff}秒</span>`;
        } else {
            delete data.activeBuffs[buff];
        }
    }
    document.getElementById("buffStatus").innerHTML = buffText;
}

function isBuffActive(buffName){
    return data.activeBuffs[buffName] && data.activeBuffs[buffName] > Date.now();
}

/* 破壊システム */
function openDestroy() {
    if (!isBuffActive("❓ 異質なポーション")) {
        alert("今はまだ押しても反応しない...。\n異質なポーションの効果中のみ「破壊」が可能になるようだ。");
        return;
    }
    if (confirm("【警告】\n本当に世界を破壊しますか？\n\n実績と異星のミント以外、すべて（所持金、株、アイテム、バフ）が初期化されます。\n※持っている全ミント（所持ポイント＋アイテム合計）10個につき、異星のミントを1つ獲得します。")) {
        doDestroy();
    }
}

function doDestroy() {
    // ミント総数を計算
    let totalMints = data.mint;
    for(let m in data.mintInventory) {
        totalMints += data.mintInventory[m];
    }
    let gained = Math.max(1, Math.floor(totalMints / 10));
    
    // 異星のミント付与
    data.alienMints += gained;
    
    // データ初期化 (実績、永続カウンター、異星ミント以外)
    data.money = 10000;
    data.points = 0;
    data.mint = 0;
    data.mintInventory = {};
    data.potions = {};
    data.activeBuffs = {};
    
    // 株価のリセット
    data.stocks.forEach((stock, i) => {
        let initialPrice = Math.floor(stockTemplates[i].basePrice * (0.9 + Math.random() * 0.2));
        stock.price = initialPrice;
        stock.owned = 0;
        stock.unlocked = i < 3;
        stock.history = [initialPrice];
        stock.buyPrice = 0;
    });

    showNotification(`💥 世界が崩壊し、再構築されました...\n👽 異星のミントを ${gained} 個獲得しました！`);
    updateUI();
    save();
}

function drawAllGraph(){
    const canvas=document.getElementById("allGraph");
    const ctx=canvas.getContext("2d");
    canvas.width=canvas.clientWidth;
    canvas.height=300;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const colors=["cyan","lime","yellow","orange","red","magenta","white","blue","pink","lightgreen"];

    data.stocks.forEach((stock,index)=>{
        if(!stock.visible || !stock.history || stock.history.length === 0) return;
        const max=Math.max(...stock.history, 1);
        const min=Math.min(...stock.history, 0);
        let range = max - min;
        if(range === 0) range = 1; 

        ctx.beginPath();
        ctx.strokeStyle=colors[index];
        ctx.lineWidth=2;

        if(stock.history.length === 1){
            const y = canvas.height - ((stock.history[0] - min) / range) * canvas.height;
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
        } else {
            stock.history.forEach((price,i)=>{
                const x=(i/(stock.history.length-1))*canvas.width;
                const y=canvas.height-((price-min)/range)*canvas.height;
                if(i==0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            });
        }
        ctx.stroke();
    });
}

function showNotification(text){
    const container = document.getElementById("notificationContainer");
    const popup = document.createElement("div");
    popup.style.background = "linear-gradient(45deg, rgba(59, 7, 100, 0.95), rgba(126, 34, 206, 0.95))";
    popup.style.border = "1px solid #c084fc";
    popup.style.padding = "15px";
    popup.style.borderRadius = "10px";
    popup.style.boxShadow = "0 0 20px #a855f7";
    popup.style.color = "white";
    popup.style.fontWeight = "bold";
    popup.style.opacity = "0";
    popup.style.transform = "translateX(100px)";
    popup.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    popup.innerText = text;
    container.appendChild(popup);
    setTimeout(() => { popup.style.opacity = "1"; popup.style.transform = "translateX(0)"; }, 10);
    setTimeout(() => { popup.style.opacity = "0"; popup.style.transform = "translateX(100px)"; setTimeout(() => popup.remove(), 500); }, 4000);
}

function spinGacha(times){
    if(isGachaSpinning) return;
    const cost = 20 * times;
    if(data.mint < cost){ alert("ミントが足りません"); return; }
    
    data.mint -= cost;
    isGachaSpinning = true;
    updateUI();
    document.getElementById("gachaBtn").disabled = true;
    document.getElementById("gacha10Btn").disabled = true;

    const resultBox=document.getElementById("gachaResult");
    const names=mintTable.map(m=>m.name);
    let count=0;

    const anim=setInterval(()=>{
        resultBox.innerText = times === 1 ? names[Math.floor(Math.random()*names.length)] : "✨ ガチャ回転中... ✨";
        count++;
        if(count>20){
            clearInterval(anim);
            
            let results = {};
            for(let i=0; i<times; i++) {
                let rand=Math.random()*100;
                let total=0; let drop="";
                for(let m of mintTable){
                    total+=m.rate;
                    if(rand<=total){ drop=m.name; break; }
                }
                results[drop] = (results[drop] || 0) + 1;
                if(!data.mintInventory[drop]) data.mintInventory[drop]=0;
                data.mintInventory[drop]++;
                data.gachaCount++;
            }
            
            if(times === 1) {
                resultBox.innerText="✨ "+ Object.keys(results)[0] +" ✨";
            } else {
                let resStr = Object.entries(results).map(([k,v]) => `${k} x${v}`).join("<br>");
                resultBox.innerHTML = `<div style="font-size:24px; line-height:1.5;">${resStr}</div>`;
            }
            
            isGachaSpinning = false;
            document.getElementById("gachaBtn").disabled = false;
            document.getElementById("gacha10Btn").disabled = false;
            checkAchievements(); save();
        }
    },80);
}

    "青ミント": 2, "赤ミント": 2, "ベーシックミント": 2, "緑ミント": 2,
    "ウォーターミント"6: , "紫ミント": 4, "金ミント": 7, "チョコチップミント": 10,

function doBrew(){
    const basicCount = data.mintInventory["ベーシックミント"] || 0;
    const m1 = document.getElementById("brewMat1").value;
    const m2 = document.getElementById("brewMat2").value;

    if(basicCount < 1){ alert("ベーシックミントが足りません！"); return; }
    if(!m1 || !m2){ alert("追加素材となるミントを選択してください！"); return; }

    let tempInv = { ...data.mintInventory };
    tempInv["ベーシックミント"]--;
    if(tempInv[m1] <= 0){ alert(`${m1} が足りません！`); return; }
    tempInv[m1]--;
    if(tempInv[m2] <= 0){ alert(`${m2} が足りません！`); return; }
    
    data.mintInventory["ベーシックミント"]--;
    data.mintInventory[m1]--;
    data.mintInventory[m2]--;

    let result = "";

    // 🌟 特殊レシピ
    if ((m1 === "ブラッドミント" && m2 === "ギャラクシーミント") || (m1 === "ギャラクシーミント" && m2 === "ブラッドミント")) {
        result = "❓ 異質なポーション";
        data.alienPotionCount++;
    } else {
        let score = (mintScores[m1] || 1) + (mintScores[m2] || 1);
        let pool = [];

        if (score < 10) pool = ["⭐ 知識の霊薬", "📈 ハイパードライブ薬", "💰 黄金の雫"];
        else if (score < 20) pool = ["💰 黄金の雫", "🛡 プロテクトジェル", "⏳ タイムワープ薬"];
        else if (score < 40) pool = ["💎 ミントブースト", "🚀 ギャラクシーブル", "⏳ タイムワープ薬"];
        else pool = ["🚀 ギャラクシーブル", "✨ 奇跡の雫", "💎 ミントブースト"];
        
        result = pool[Math.floor(Math.random() * pool.length)];
    }

    if(!data.potions[result]) data.potions[result] = 0;
    data.potions[result]++;
    data.brewCount++;
    
    showNotification("🧪 " + result + " を醸造しました！");
    checkAchievements();
    save();
    openBrew(); 
}

function usePotion(pName){
    if(!data.potions[pName] || data.potions[pName] <= 0) return;
    
    const effect = potionEffects[pName];
    data.potions[pName]--;

    if(effect.type === "instant"){
        effect.action();
        showNotification("✨ " + pName + " を使用しました！");
    } else if (effect.type === "buff"){
        data.activeBuffs[pName] = Date.now() + effect.duration;
        showNotification("🔥 " + pName + " の効果が発動！");
    }

    updateUI();
    openBag();
}
