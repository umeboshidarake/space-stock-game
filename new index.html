<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Stock Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nicknameScreen">
    <h1>Stock Simulator</h1>
    <input type="text" id="nicknameInput" placeholder="ニックネーム">
    <button onclick="startGame()">START</button>
</div>

<div id="gameScreen" style="display:none;">
    <h2 id="playerName"></h2>
    <p>所持ポイント: <span id="points"></span></p>
    <p>現在株価: <span id="stockPrice"></span></p>
    <button onclick="buyStock()">購入</button>
    <button onclick="sellStock()">売却</button>

    <canvas id="chart" width="400" height="200"></canvas>

    <h3>ランキング</h3>
    <ul id="ranking"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
